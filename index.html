<!DOCTYPE html>
<html lang="en">
  <head>
    <title>My linktree</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <style>
/* CSS Variables (Design Tokens) */
      :root {
        --primary: #d1cbbe;
        --green: #807a6c;
        --radius: 15px;
        --shadow: 0 5px 30px rgba(0,0,0,.15);
        }
      
      header, footer {
        color: var(--primary); 
        text-align: center;
        margin-bottom: 30px;
      }
      main {
        max-width: 450px;
        margin: 0 auto;
      }
      footer {
        padding-bottom: 50px;
        margin-top: 50px;
        font-size: 12px;
      }
      footer a {
        text-decoration: none;
        color: inherit;
        &:hover {
          text-decoration: underline;
        }
      }
      body {
        font-family: 'Caveat', cursive;
        padding: 20px;
        background-color: #f9f1e1;
        }
      
      .card {
        background: #f9f1df;
        padding: 20px;
        margin-bottom: 20px;
        margin-left:70px;
        margin-right:70px;
        box-shadow:var(--shadow);
        border-radius: var(--radius);
        color: var(--green);
        font-size: 25px;
        display: flex;
        align-items: center;
        gap: 35px;
        border: 2px solid transparent;
        
        &:hover {
          border: 2px solid #a8987d;
          transform: translatey(-2px);
        }
      } 
    </style>
  </head>
